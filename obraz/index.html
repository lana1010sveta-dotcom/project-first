<head>

  <!-- Preconnect ускоряет DNS/TCP для Google Fonts -->

<body>

  <!-- Контейнер экранов — сюда рендерится текущий экран -->

    </button>
    <button class="nav-item active" data-tab="home">

    <button class="nav-item" data-tab="services">

    <button class="nav-item" data-tab="gallery">

      <span class="nav-label">Работы</span>
    </button>
    <button class="nav-item" data-tab="my-bookings">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>

      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
      <span class="nav-label">Мастер</span>
    </button>
  </nav>

  <!-- Лайтбокс для галереи -->
  <div id="lightbox" class="overlay hidden">
    <div class="overlay-backdrop" id="lightbox-close"></div>
    <div id="lightbox-content">
      <button class="lightbox-close-btn" id="lightbox-x">✕</button>
      <div id="lightbox-img"></div>
      <div id="lightbox-footer">
        <div id="lightbox-title"></div>
        <button class="btn btn-primary" id="lightbox-book">Записаться на такую же</button>
      </div>
    </div>
  </div>

  <!-- Нижний лист (bottom sheet) для подтверждения отмены -->
  <div id="bottom-sheet" class="overlay hidden">
    <div class="overlay-backdrop" id="bs-close"></div>
    <div id="bs-panel">
      <div id="bs-body"></div>
    </div>
  </div>

  <!-- Toast уведомление -->
  <div id="toast" class="hidden"></div>

  <!-- Оффер-модалка: один раз при первом открытии -->
  <div id="offer-overlay" class="offer-overlay hidden">
    <div class="offer-backdrop" id="offer-backdrop"></div>
    <div class="offer-card">
      <div class="offer-emoji">🎁</div>
      <div class="offer-title">Скидка 15% на первую запись</div>
      <div class="offer-subtitle">Подпишитесь на бота —<br>получите промокод в личное сообщение</div>
      <ul class="offer-bullets">
        <li>Напомним о записи за день</li>
        <li>Первыми узнаёте о свободных окошках</li>
        <li>Эксклюзивные акции для подписчиков</li>
      </ul>
      <a class="offer-cta" href="https://t.me/test_salon_123_bot?start=from_app" id="offer-cta">
        Получить скидку 15%
      </a>
      <button class="offer-skip" id="offer-skip">Пропустить</button>
    </div>
  </div>

</div><!-- #app -->

<!-- Демо-переключатель палитры (только для витрины, убрать перед продом) -->
<button id="theme-toggle" type="button" aria-label="Сменить палитру">Палитра 2 · бирюза</button>
<script>
  (function () {
    /* — Переключатель палитры (Персик ⇄ Бирюза) — */
    var KEY = 'obraz_theme';
    var fromUrl = new URLSearchParams(location.search).get('theme');
    var saved = fromUrl || localStorage.getItem(KEY) || 'peach';
    var btn = document.getElementById('theme-toggle');
    function applyTheme(t) {
      var teal = (t === 'teal');
      document.documentElement.classList.toggle('theme-teal', teal);
      if (btn) btn.textContent = teal ? 'Палитра 1 · персик' : 'Палитра 2 · бирюза';
      try { localStorage.setItem(KEY, teal ? 'teal' : 'peach'); } catch (e) {}
    }
    applyTheme(saved === 'teal' ? 'teal' : 'peach');
    if (btn) btn.addEventListener('click', function () {
      applyTheme(document.documentElement.classList.contains('theme-teal') ? 'peach' : 'teal');
    });
  })();
</script>

<!-- API слой -->
<script src="api.js?v=20260701obraz12"></script>
<!-- Данные: услуги, галерея, конфиг салона -->
<script src="data.js?v=20260701obraz12"></script>
<!-- Главный файл: роутер, рендер экранов, события -->
<script src="app.js?v=20260701obraz12"></script>

</body>
</html>
