<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Svetlana Dev</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --p:   #7c6fff;
  --p2:  #a78bfa;
  --p3:  #c4b5fd;
  --td:  rgba(55,35,110,0.9);
  --tm:  rgba(100,80,160,0.72);
  --tl:  rgba(130,110,180,0.55);
  --g:   rgba(255,255,255,0.55);
  --gb:  rgba(255,255,255,0.8);
}

html { scroll-behavior: smooth; }

body {
  min-height: 100dvh;
  background:
    radial-gradient(ellipse 70% 60% at 15% 50%, #ebe8ff 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 85% 15%, #e4eeff 0%, transparent 65%),
    radial-gradient(ellipse 50% 50% at 65% 85%, #f0e6ff 0%, transparent 60%),
    #f5f4ff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  overflow-x: hidden;
}

/* ── Canvas network ── */
#cvs {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── Sparkle stars ── */
.sp {
  position: fixed;
  pointer-events: none;
  z-index: 1;
  animation: spk var(--d) var(--dl) ease-in-out infinite;
  opacity: 0;
}
@keyframes spk {
  0%,100% { opacity:0; transform:scale(0) rotate(0deg); }
  50%      { opacity:1; transform:scale(1) rotate(25deg); }
}

/* ── Orbs ── */
.orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
}
.orb-a {
  width: 230px; height: 230px;
  bottom: 4%; left: 2%;
  background: radial-gradient(circle at 32% 28%,
    rgba(255,255,255,.96) 0%,
    rgba(210,195,255,.55) 38%,
    rgba(170,150,255,.18) 68%,
    transparent 100%);
  border: 1px solid rgba(200,185,255,.35);
  box-shadow:
    0 0 90px rgba(155,135,255,.2),
    inset 0 0 60px rgba(255,255,255,.55),
    inset 0 0 110px rgba(185,165,255,.08);
  animation: orbF 7s ease-in-out infinite;
}
.orb-b {
  width: 105px; height: 105px;
  bottom: 27%; left: 9%;
  background: radial-gradient(circle at 34% 30%,
    rgba(255,255,255,.92),
    rgba(195,178,255,.38),
    transparent);
  border: 1px solid rgba(200,185,255,.28);
  box-shadow:
    0 0 44px rgba(155,135,255,.14),
    inset 0 0 32px rgba(255,255,255,.7);
  animation: orbF 9s ease-in-out infinite reverse;
}
@keyframes orbF {
  0%,100% { transform: translateY(0)    rotate(0deg);  }
  33%      { transform: translateY(-20px) rotate(4deg); }
  66%      { transform: translateY(-9px)  rotate(-2deg);}
}

/* ── Page grid ── */
.page {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 980px;
  display: grid;
  grid-template-columns: 200px 380px 200px;
  grid-template-rows: auto;
  gap: 14px;
  align-items: center;
  justify-items: center;
}
.col-l { grid-column:1; display:flex; flex-direction:column; gap:12px; width:100%; }
.col-c { grid-column:2; width:100%; }
.col-r { grid-column:3; display:flex; flex-direction:column; gap:12px; width:100%; }

/* ── Glass card base ── */
.glass {
  background: rgba(255,255,255,.52);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border: 1px solid var(--gb);
  border-radius: 20px;
  box-shadow: 0 8px 36px rgba(140,120,255,.1), 0 1px 2px rgba(255,255,255,.75);
  transition: transform .3s ease, box-shadow .3s ease;
}
.glass:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 44px rgba(140,120,255,.18), 0 1px 2px rgba(255,255,255,.8);
}

/* ── Float mini-cards ── */
.fc { padding: 14px 16px; }
.fc-label {
  font-size: .63rem;
  color: var(--tl);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 6px;
}
.fc-val {
  font-size: .84rem;
  color: var(--td);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 7px;
}
.live {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--p);
  box-shadow: 0 0 8px rgba(124,111,255,.65);
  flex-shrink: 0;
  animation: live 2s ease-in-out infinite;
}
@keyframes live { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.5);opacity:.55;} }

.agent-list { margin-top:8px; }
.ag-item { display:flex; align-items:center; gap:7px; font-size:.7rem; color:var(--tm); padding:2px 0; }
.ag-dot  { width:5px; height:5px; border-radius:50%; background:var(--p2); flex-shrink:0; }

.wave-svg { width:100%; height:28px; margin-top:8px; opacity:.65; }

.bars { display:flex; align-items:flex-end; gap:3px; height:28px; margin-top:8px; }
.bar {
  border-radius: 3px;
  background: linear-gradient(180deg, var(--p2), var(--p));
  animation: barA var(--d) ease-in-out infinite alternate;
}
@keyframes barA { from{height:30%;} to{height:100%;} }

.cdots { display:flex; align-items:center; gap:7px; margin-top:8px; flex-wrap:wrap; }
.cdot {
  width:22px; height:22px;
  border-radius:7px;
  background: rgba(155,135,255,.14);
  border: 1px solid rgba(155,135,255,.28);
  display:flex; align-items:center; justify-content:center;
}

/* ── Main card ── */
.main-card {
  padding: 44px 36px 38px;
  border-radius: 28px !important;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.main-card::before {
  content:'';
  position:absolute; top:-60%; left:-30%;
  width:160%; height:160%;
  background: radial-gradient(circle at 50% 10%, rgba(155,135,255,.07), transparent 60%);
  pointer-events:none;
}

/* ── Avatar ── */
.av-wrap {
  position: relative;
  width: 90px; height: 90px;
  margin: 0 auto 28px;
}
.av-ring {
  position:absolute; inset:-11px;
  border-radius:50%;
  border:1.5px dashed rgba(155,135,255,.38);
  animation: ringR 13s linear infinite;
}
.av-ring2 {
  position:absolute; inset:-4px;
  border-radius:50%;
  border:1px solid rgba(180,160,255,.22);
  animation: ringR 8s linear infinite reverse;
}
@keyframes ringR { to{transform:rotate(360deg);} }

.av-circle {
  width:90px; height:90px;
  border-radius:50%;
  background: linear-gradient(135deg,
    rgba(185,168,255,.48) 0%,
    rgba(140,120,255,.28) 50%,
    rgba(205,190,255,.38) 100%);
  border: 1.5px solid rgba(255,255,255,.9);
  box-shadow:
    0 0 32px rgba(140,120,255,.38),
    0 0 70px rgba(140,120,255,.16),
    inset 0 0 22px rgba(255,255,255,.55);
  display:flex; align-items:center; justify-content:center;
  animation: avP 4s ease-in-out infinite;
}
@keyframes avP {
  0%,100%{box-shadow:0 0 32px rgba(140,120,255,.38),0 0 70px rgba(140,120,255,.16),inset 0 0 22px rgba(255,255,255,.55);}
  50%    {box-shadow:0 0 55px rgba(140,120,255,.55),0 0 110px rgba(140,120,255,.28),inset 0 0 28px rgba(255,255,255,.65);}
}

/* ── Name ── */
.name {
  font-size: 2.1rem;
  font-weight: 800;
  letter-spacing: -.02em;
  background: linear-gradient(135deg, #5e4de8, #7c6fff, #a78bfa, #6f5ee0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 14px rgba(120,100,255,.42));
  animation: nameG 4s ease-in-out infinite;
  margin-bottom: 7px;
}
@keyframes nameG {
  0%,100%{filter:drop-shadow(0 0 12px rgba(120,100,255,.38));}
  50%    {filter:drop-shadow(0 0 24px rgba(120,100,255,.62));}
}

.sub {
  font-size: .76rem;
  color: var(--tl);
  text-transform: uppercase;
  letter-spacing: .13em;
  margin-bottom: 26px;
}

/* ── Tags ── */
.tags { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-bottom:26px; }
.tag {
  display:inline-flex; align-items:center; gap:5px;
  padding: 6px 13px;
  background: rgba(155,135,255,.1);
  border: 1px solid rgba(155,135,255,.24);
  border-radius: 100px;
  font-size: .75rem;
  color: var(--tm);
  cursor: default;
  transition: all .3s;
}
.tag:hover {
  background: rgba(155,135,255,.22);
  border-color: rgba(120,100,255,.48);
  transform: translateY(-2px);
  box-shadow: 0 5px 18px rgba(140,120,255,.2);
  color: var(--td);
}
.tag-dot { width:5px; height:5px; border-radius:50%; background:var(--p2); flex-shrink:0; }

.sep {
  width:100%; height:1px;
  background:linear-gradient(90deg,transparent,rgba(155,135,255,.2),transparent);
  margin-bottom:22px;
}

/* ── Socials ── */
.socials { display:flex; gap:13px; justify-content:center; margin-bottom:22px; }
.soc {
  width: 50px; height: 50px;
  border-radius: 15px;
  background: rgba(255,255,255,.72);
  border: 1px solid rgba(200,185,255,.38);
  display: flex; align-items:center; justify-content:center;
  text-decoration: none;
  transition: all .35s cubic-bezier(.175,.885,.32,1.275);
  position: relative; overflow: hidden;
}
.soc::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(120,100,255,.14), rgba(155,135,255,.07));
  opacity:0; transition:opacity .3s; border-radius:inherit;
}
.soc:hover { transform:translateY(-5px) scale(1.1); box-shadow:0 12px 30px rgba(120,100,255,.26), 0 0 0 1px rgba(120,100,255,.28); }
.soc:hover::after { opacity:1; }
.soc svg { width:24px; height:24px; position:relative; z-index:1; transition:transform .3s; }
.soc:hover svg { transform:scale(1.1); }

/* ── CTA ── */
.cta {
  display: inline-flex; align-items:center; gap:10px;
  padding: 15px 40px;
  background: linear-gradient(135deg, #7260ff, #9b87ff, #a78bfa);
  color: white;
  text-decoration: none;
  border-radius: 100px;
  font-size: .95rem;
  font-weight: 600;
  letter-spacing: .02em;
  position: relative; overflow: hidden;
  transition: transform .3s, box-shadow .3s;
  box-shadow: 0 6px 26px rgba(120,100,255,.48);
  animation: ctaP 3s ease-in-out infinite;
}
@keyframes ctaP {
  0%,100%{box-shadow:0 6px 26px rgba(120,100,255,.48);}
  50%    {box-shadow:0 6px 44px rgba(120,100,255,.68), 0 0 80px rgba(120,100,255,.14);}
}
.cta-sh {
  position:absolute; top:0; left:-100%;
  width:100%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.27), transparent);
  transition:left .6s;
  pointer-events:none;
}
.cta:hover { transform:translateY(-2px) scale(1.03); }
.cta:hover .cta-sh { left:100%; }

/* ── Responsive ── */
@media(max-width:780px){
  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .col-l, .col-r {
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 420px;
  }
  .glass.fc { flex: 1 1 150px; }
  .col-c { max-width: 420px; width: 100%; }
  .orb-a { width:150px; height:150px; }
  .orb-b { display:none; }
  .name  { font-size:1.8rem; }
}
@media(max-width:440px){
  .col-l, .col-r { display:none; }
  .main-card { padding:34px 22px 30px; }
  .name { font-size:1.6rem; }
}
</style>
</head>

<script>
/* ── Particle network ─────────────────────────────────────────── */
const cvs = document.getElementById('cvs');
const cx  = cvs.getContext('2d');
let W, H, dots = [];
const mouse = { x:-9999, y:-9999 };

function setSize(){
  cvs.width  = W = window.innerWidth;
  cvs.height = H = window.innerHeight;
}
setSize();
window.addEventListener('resize', ()=>{ setSize(); spawn(); });
document.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });

class Dot {
  constructor(){
    this.x  = Math.random()*W;
    this.y  = Math.random()*H;
    this.vx = (Math.random()-.5)*.38;
    this.vy = (Math.random()-.5)*.38;
    this.r  = Math.random()*2.4+.7;
    this.a0 = Math.random()*.42+.14;
    this.a  = this.a0;
    this.h  = 248 + Math.random()*28;
  }
  step(){
    const dx=mouse.x-this.x, dy=mouse.y-this.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<130){ this.vx+=dx*.00028; this.vy+=dy*.00028; this.a=Math.min(.82,this.a0+(1-d/130)*.42); }
    else { this.a+=(this.a0-this.a)*.06; }
    this.vx*=.982; this.vy*=.982;
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<0)this.x=W; if(this.x>W)this.x=0;
    if(this.y<0)this.y=H; if(this.y>H)this.y=0;
  }
  draw(){
    const g=cx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*4.5);
    g.addColorStop(0,`hsla(${this.h},78%,68%,${this.a})`);
    g.addColorStop(1,`hsla(${this.h},78%,68%,0)`);
    cx.beginPath(); cx.arc(this.x,this.y,this.r*4.5,0,Math.PI*2);
    cx.fillStyle=g; cx.fill();
    cx.beginPath(); cx.arc(this.x,this.y,this.r,0,Math.PI*2);
    cx.fillStyle=`hsla(${this.h},80%,72%,${this.a*1.6})`; cx.fill();
  }
}

function spawn(){
  const n=Math.min(58, Math.floor(W*H/15000));
  dots=Array.from({length:n},()=>new Dot());
}
spawn();

function links(){
  const D=145;
  for(let i=0;i<dots.length;i++){
    for(let j=i+1;j<dots.length;j++){
      const dx=dots[i].x-dots[j].x, dy=dots[i].y-dots[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<D){
        const t=1-d/D;
        cx.beginPath();
        cx.moveTo(dots[i].x,dots[i].y);
        cx.lineTo(dots[j].x,dots[j].y);
        cx.strokeStyle=`rgba(148,128,255,${t*.24})`;
        cx.lineWidth=t*1.3;
        cx.stroke();
      }
    }
  }
}

(function loop(){
  cx.clearRect(0,0,W,H);
  links();
  dots.forEach(d=>{ d.step(); d.draw(); });
  requestAnimationFrame(loop);
})();

/* ── Sparkle stars ─────────────────────────────────────────────── */
for(let i=0;i<22;i++){
  const el=document.createElement('div');
  el.className='sp';
  const s=Math.random()*13+5;
  el.style.cssText=`
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    width:${s}px; height:${s}px;
    --d:${(Math.random()*3+2).toFixed(1)}s;
    --dl:${(Math.random()*4).toFixed(1)}s;
  `;
  el.innerHTML=`<svg width="${s}" height="${s}" viewBox="0 0 20 20" fill="none">
    <path d="M10 1 L11.9 7.6 L18.5 7.5 L13.2 11.7 L15.2 18.2 L10 14.2 L4.8 18.2 L6.8 11.7 L1.5 7.5 L8.1 7.6 Z"
    fill="rgba(175,158,255,.72)"/>
  </svg>`;
  document.body.appendChild(el);
}
</script>
