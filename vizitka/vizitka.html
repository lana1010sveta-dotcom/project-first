<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Светлана — Svetlana Dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F7F9FC;
      --surface:  #ffffff;
      --a1:       #7C3AED;
      --a2:       #0EA5E9;
      --a1-soft:  rgba(124,58,237,.10);
      --a2-soft:  rgba(14,165,233,.10);
      --a1-mid:   rgba(124,58,237,.55);
      --a2-mid:   rgba(14,165,233,.55);
      --text:     #1A1A2E;
      --muted:    #6B7280;
      --border:   rgba(124,58,237,.14);
      --grad:     linear-gradient(135deg, var(--a1) 0%, var(--a2) 100%);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(.93); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes auroraShift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -20px) scale(1.06); }
      66%  { transform: translate(-20px, 15px) scale(.96); }
      100% { transform: translate(0, 0) scale(1); }
    }
    @keyframes auroraShift2 {
      0%   { transform: translate(0, 0) scale(1); }
      40%  { transform: translate(-25px, 18px) scale(1.05); }
      70%  { transform: translate(20px, -12px) scale(.97); }
      100% { transform: translate(0, 0) scale(1); }
    }
    @keyframes orbitRing {
      to { transform: rotate(360deg); }
    }
    @keyframes shimmerLine {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes avatarPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(124,58,237,.2), 0 8px 32px rgba(124,58,237,.15); }
      50%      { box-shadow: 0 0 0 8px rgba(124,58,237,.04), 0 12px 40px rgba(124,58,237,.25); }
    }
    @keyframes badgePop {
      0%   { opacity:0; transform: scale(.7) translateY(6px); }
      70%  { transform: scale(1.05) translateY(-1px); }
      100% { opacity:1; transform: scale(1) translateY(0); }
    }
    @keyframes tagSlide {
      from { opacity:0; transform: translateX(-10px); }
      to   { opacity:1; transform: translateX(0); }
    }
    @keyframes gradFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      overflow-x: hidden;
    }

    /* Aurora background */
    .aurora {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .55;
    }
    .aurora-blob:nth-child(1) {
      width: 560px; height: 560px;
      top: -160px; left: -140px;
      background: radial-gradient(circle, rgba(124,58,237,.22) 0%, transparent 65%);
      animation: auroraShift 20s ease-in-out infinite;
    }
    .aurora-blob:nth-child(2) {
      width: 480px; height: 480px;
      bottom: -120px; right: -100px;
      background: radial-gradient(circle, rgba(14,165,233,.18) 0%, transparent 65%);
      animation: auroraShift2 25s ease-in-out infinite;
    }
    .aurora-blob:nth-child(3) {
      width: 320px; height: 320px;
      top: 40%; left: 55%;
      background: radial-gradient(circle, rgba(167,139,250,.12) 0%, transparent 65%);
      animation: auroraShift 18s ease-in-out infinite reverse;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(124,58,237,.12);
      border-radius: 20px;
      padding: 3rem 2.6rem 2.4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.6) inset,
        0 20px 60px rgba(124,58,237,.10),
        0 4px 20px rgba(14,165,233,.06);
      animation: scaleIn .7s cubic-bezier(.22,1,.36,1) both;
    }

    /* Gradient top border */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--grad);
      background-size: 200% auto;
      animation: shimmerLine 4s linear infinite;
      border-radius: 20px 20px 0 0;
    }

    /* Avatar */
    .avatar-wrap {
      margin: 0 auto 1.6rem;
      width: 80px;
      height: 80px;
      position: relative;
    }
    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: var(--grad);
      animation: orbitRing 6s linear infinite;
      mask: radial-gradient(circle at center, transparent 68%, black 68%);
      -webkit-mask: radial-gradient(circle at center, transparent 68%, black 68%);
    }
    .avatar-inner {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--a1-soft), var(--a2-soft));
      border: 2px solid rgba(124,58,237,.18);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      animation: avatarPulse 4s ease-in-out infinite;
    }
    .avatar-inner svg {
      width: 36px;
      height: 36px;
    }

    /* Name */
    .name {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(2.2rem, 9vw, 3.2rem);
      font-weight: 400;
      font-style: italic;
      line-height: 1.05;
      letter-spacing: -.01em;
      background: linear-gradient(135deg, var(--a1) 0%, #9333EA 40%, var(--a2) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradFlow 6s ease infinite;
      margin-bottom: .35rem;
    }

    .brand {
      font-family: 'DM Sans', sans-serif;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--a1);
      opacity: .75;
      margin-bottom: 1.8rem;
    }

    /* Tags */
    .tags {
      display: flex;
      gap: .45rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
    }
    .tag {
      padding: .28rem .75rem;
      border-radius: 100px;
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .04em;
      border: 1px solid;
      animation: tagSlide .5s ease both;
    }
    .tag:nth-child(1) { animation-delay: .1s; background: var(--a1-soft); border-color: rgba(124,58,237,.22); color: var(--a1); }
    .tag:nth-child(2) { animation-delay: .2s; background: var(--a2-soft); border-color: rgba(14,165,233,.22); color: #0284C7; }
    .tag:nth-child(3) { animation-delay: .3s; background: rgba(167,139,250,.1); border-color: rgba(167,139,250,.25); color: #6D28D9; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1.4rem 0;
    }
    .div-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border));
    }
    .div-line.r {
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .div-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--grad);
      box-shadow: 0 0 8px rgba(124,58,237,.5);
    }

    /* Services */
    .services {
      display: flex;
      flex-direction: column;
      gap: .45rem;
      text-align: left;
    }
    .service {
      display: flex;
      align-items: center;
      gap: .7rem;
      padding: .65rem .9rem;
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      font-size: .82rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: .01em;
      cursor: default;
      transition: all .25s cubic-bezier(.34,1.4,.64,1);
    }
    .service:hover {
      background: linear-gradient(135deg, var(--a1-soft), var(--a2-soft));
      border-color: rgba(124,58,237,.18);
      color: var(--text);
      transform: translateX(5px);
    }
    .service-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--a1-soft), var(--a2-soft));
      border: 1px solid rgba(124,58,237,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .25s ease;
    }
    .service:hover .service-icon {
      background: var(--grad);
      border-color: transparent;
    }
    .service-icon svg {
      width: 14px; height: 14px;
      color: var(--a1);
      transition: color .25s;
    }
    .service:hover .service-icon svg {
      color: #fff;
    }
    .service-num {
      margin-left: auto;
      font-size: .6rem;
      letter-spacing: .12em;
      color: var(--a1);
      opacity: .4;
      font-weight: 600;
    }

    /* Socials */
    .socials {
      display: flex;
      gap: .6rem;
      justify-content: center;
      margin-bottom: 1.6rem;
    }
    .social-btn {
      width: 44px; height: 44px;
      border-radius: 10px;
      border: 1px solid rgba(124,58,237,.14);
      background: rgba(255,255,255,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--muted);
      transition: all .25s cubic-bezier(.34,1.4,.64,1);
      position: relative;
      overflow: hidden;
    }
    .social-btn svg { position: relative; z-index: 1; width: 18px; height: 18px; }
    .social-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .25s;
    }
    .social-btn.tg::before  { background: linear-gradient(135deg, #2aabee, #1a8dc0); }
    .social-btn.tg:hover    { border-color: #2aabee; color: #fff; transform: translateY(-4px); box-shadow: 0 8px 24px rgba(42,171,238,.3); }
    .social-btn.tg:hover::before { opacity: 1; }

    .social-btn.ig::before  { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }
    .social-btn.ig:hover    { border-color: #c13584; color: #fff; transform: translateY(-4px); box-shadow: 0 8px 24px rgba(193,53,132,.3); }
    .social-btn.ig:hover::before { opacity: 1; }

    .social-btn.gh::before  { background: linear-gradient(135deg, #374151, #111827); }
    .social-btn.gh:hover    { border-color: #6b7280; color: #fff; transform: translateY(-4px); box-shadow: 0 8px 24px rgba(75,85,99,.25); }
    .social-btn.gh:hover::before { opacity: 1; }

    .social-btn.mail::before { background: var(--grad); }
    .social-btn.mail:hover   { border-color: var(--a1); color: #fff; transform: translateY(-4px); box-shadow: 0 8px 24px rgba(124,58,237,.3); }
    .social-btn.mail:hover::before { opacity: 1; }

    /* CTA */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      padding: .85rem 2.2rem;
      border-radius: 10px;
      border: none;
      background: var(--grad);
      background-size: 200% auto;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .2s cubic-bezier(.34,1.4,.64,1), box-shadow .2s ease;
      box-shadow: 0 4px 20px rgba(124,58,237,.35), 0 1px 4px rgba(124,58,237,.2);
      animation: gradFlow 4s ease infinite;
    }
    .cta::after {
      content: '';
      position: absolute;
      top: 0; left: -80%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
      transform: skewX(-20deg);
      transition: left .5s ease;
    }
    .cta span, .cta svg { position: relative; z-index: 1; }
    .cta svg { width: 15px; height: 15px; }
    .cta:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(124,58,237,.45), 0 2px 8px rgba(124,58,237,.25); }
    .cta:hover::after { left: 130%; }
    .cta:active { transform: scale(.97); }

    .footer {
      margin-top: 1.6rem;
      font-size: .6rem;
      font-weight: 500;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: .45;
    }

    @media (max-width: 400px) {
      .card { padding: 2.2rem 1.5rem 2rem; }
    }
  </style>
</head>
