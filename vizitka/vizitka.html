<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Светлана — Digital Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #060608;
      --surface:   #0d0d10;
      --gold-1:    #f5e6c0;
      --gold-2:    #d4a847;
      --gold-3:    #9a6e1e;
      --gold-dim:  rgba(212,168,71,.15);
      --text:      #ede8de;
      --muted:     #6b6560;
      --line:      rgba(212,168,71,.18);
    }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:none; } }
    @keyframes scaleIn  { from { opacity:0; transform:scale(.94); } to { opacity:1; transform:scale(1); } }
    @keyframes rotateRing { to { transform:rotate(360deg); } }
    @keyframes goldPulse {
      0%,100% { filter: drop-shadow(0 0 14px rgba(212,168,71,.35)); }
      50%      { filter: drop-shadow(0 0 30px rgba(212,168,71,.65)) drop-shadow(0 0 55px rgba(245,230,192,.15)); }
    }
    @keyframes lineShimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes dust {
      0%   { transform:translateY(100vh) scale(0); opacity:0; }
      8%   { opacity:.7; }
      92%  { opacity:.2; }
      100% { transform:translateY(-8vh) scale(1); opacity:0; }
    }
    @keyframes ctaGlow {
      0%,100% { box-shadow: 0 0 18px rgba(212,168,71,.3), 0 6px 28px rgba(0,0,0,.5); }
      50%      { box-shadow: 0 0 36px rgba(212,168,71,.55), 0 8px 36px rgba(0,0,0,.5); }
    }
    @keyframes orb1 {
      0%,100% { transform:translate(0,0) scale(1); }
      33%     { transform:translate(40px,-30px) scale(1.08); }
      66%     { transform:translate(-20px,20px) scale(.94); }
    }
    @keyframes orb2 {
      0%,100% { transform:translate(0,0) scale(1); }
      40%     { transform:translate(-35px,25px) scale(1.06); }
      70%     { transform:translate(25px,-15px) scale(.96); }
    }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, serif;
      overflow-x: hidden;
    }
    .orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .orb { position:absolute; border-radius:50%; filter:blur(90px); }
    .orb-1 { width:500px; height:500px; top:-100px; left:-120px; background:radial-gradient(circle, rgba(212,168,71,.09) 0%, transparent 70%); animation:orb1 18s ease-in-out infinite; }
    .orb-2 { width:420px; height:420px; bottom:-80px; right:-100px; background:radial-gradient(circle, rgba(154,110,30,.08) 0%, transparent 70%); animation:orb2 22s ease-in-out infinite; }
    .dust { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .mote { position:absolute; border-radius:50%; opacity:0; animation:dust linear infinite; }
    .page { position:relative; z-index:1; min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
    .card {
      width:100%; max-width:460px;
      background: linear-gradient(160deg, #111116 0%, #0a0a0d 100%);
      border:1px solid var(--line);
      border-radius:4px;
      padding:3.2rem 2.8rem 2.6rem;
      text-align:center;
      position:relative; overflow:hidden;
      box-shadow: 0 0 0 1px rgba(212,168,71,.06), 0 30px 80px rgba(0,0,0,.7), inset 0 1px 0 rgba(212,168,71,.1);
      animation:scaleIn .8s cubic-bezier(.22,1,.36,1) both;
    }
    .card::before, .card::after, .corner-br, .corner-bl {
      content:''; position:absolute; width:18px; height:18px;
      border-color:var(--gold-2); border-style:solid; opacity:.5;
    }
    .card::before { top:12px; left:12px;  border-width:1px 0 0 1px; }
    .card::after  { top:12px; right:12px; border-width:1px 1px 0 0; }
    .corner-br    { bottom:12px; right:12px; border-width:0 1px 1px 0; }
    .corner-bl    { bottom:12px; left:12px;  border-width:0 0 1px 1px; }
    .shimmer-line {
      position:absolute; top:0; left:15%; right:15%; height:1px;
      background:linear-gradient(90deg, transparent, var(--gold-2), var(--gold-1), var(--gold-2), transparent);
      background-size:200% auto;
      animation:lineShimmer 4s linear infinite;
    }
    .monogram-wrap { margin:0 auto 2rem; width:88px; height:88px; position:relative; }
    .monogram-ring {
      position:absolute; inset:-5px; border-radius:50%;
      background:conic-gradient(from 0deg, transparent 0%, var(--gold-3) 25%, var(--gold-2) 50%, var(--gold-1) 75%, transparent 100%);
      animation:rotateRing 6s linear infinite;
    }
    .monogram-ring::after { content:''; position:absolute; inset:2px; border-radius:50%; background:var(--bg); }
    .monogram-inner {
      position:relative; z-index:1; width:88px; height:88px; border-radius:50%;
      background:linear-gradient(145deg, #16161a, #0e0e12);
      border:1px solid rgba(212,168,71,.2);
      display:flex; align-items:center; justify-content:center;
    }
    .monogram-inner svg { width:38px; height:38px; opacity:.9; }
    .name {
      font-size: clamp(2.6rem, 9vw, 3.8rem);
      font-weight:400; letter-spacing:.08em; line-height:1; font-style:italic;
      background:linear-gradient(135deg, var(--gold-1) 0%, var(--gold-2) 45%, #b8891e 75%, var(--gold-1) 100%);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
      animation:goldPulse 4s ease-in-out infinite; margin-bottom:.6rem;
    }
    .tagline {
      font-family:-apple-system, BlinkMacSystemFont, sans-serif;
      font-size:.65rem; font-weight:400; letter-spacing:.35em; text-transform:uppercase;
      color:var(--gold-2); opacity:.7; margin-bottom:2rem;
    }
    .divider { display:flex; align-items:center; gap:.8rem; margin:1.6rem 0; }
    .divider-line { flex:1; height:1px; background:linear-gradient(90deg, transparent, var(--line)); }
    .divider-line.r { background:linear-gradient(90deg, var(--line), transparent); }
    .divider-gem { width:5px; height:5px; transform:rotate(45deg); background:var(--gold-2); opacity:.5; }
    .services { display:flex; flex-direction:column; gap:.55rem; }
    .service-item {
      display:flex; align-items:center; gap:.75rem;
      padding:.6rem .9rem; border:1px solid transparent; border-radius:3px;
      font-family:-apple-system, BlinkMacSystemFont, sans-serif;
      font-size:.82rem; color:#b8a98a; letter-spacing:.04em;
      cursor:default; transition:all .3s ease; background:rgba(212,168,71,.02);
    }
    .service-item:hover { border-color:rgba(212,168,71,.2); background:rgba(212,168,71,.06); color:var(--gold-1); transform:translateX(4px); }
    .service-item .s-icon { width:28px; height:28px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .service-item .s-icon svg { width:16px; height:16px; color:var(--gold-2); opacity:.7; transition:opacity .3s; }
    .service-item:hover .s-icon svg { opacity:1; }
    .service-item .s-num { margin-left:auto; font-size:.6rem; letter-spacing:.1em; color:var(--muted); opacity:.6; }
    .socials { display:flex; gap:.75rem; justify-content:center; margin-bottom:1.8rem; }
    .social-btn {
      width:46px; height:46px; border-radius:3px;
      border:1px solid rgba(212,168,71,.15); background:rgba(212,168,71,.03);
      display:flex; align-items:center; justify-content:center;
      text-decoration:none; color:var(--muted);
      transition:all .3s cubic-bezier(.34,1.4,.64,1);
      position:relative; overflow:hidden;
    }
    .social-btn svg { position:relative; z-index:1; width:20px; height:20px; }
    .social-btn::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity .3s; }
    .social-btn.tg::before  { background:linear-gradient(135deg,#2aabee,#1a8dc0); }
    .social-btn.tg:hover    { border-color:#2aabee; color:#fff; transform:translateY(-5px); box-shadow:0 10px 28px rgba(42,171,238,.28); }
    .social-btn.tg:hover::before { opacity:1; }
    .social-btn.ig::before  { background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); }
    .social-btn.ig:hover    { border-color:#c13584; color:#fff; transform:translateY(-5px); box-shadow:0 10px 28px rgba(193,53,132,.28); }
    .social-btn.ig:hover::before { opacity:1; }
    .social-btn.gh::before  { background:linear-gradient(135deg,#3a3a3a,#222); }
    .social-btn.gh:hover    { border-color:#6b7280; color:#fff; transform:translateY(-5px); box-shadow:0 10px 28px rgba(100,100,100,.25); }
    .social-btn.gh:hover::before { opacity:1; }
    .social-btn.mail::before { background:linear-gradient(135deg,#c9a84c,#9a6e1e); }
    .social-btn.mail:hover   { border-color:var(--gold-2); color:#fff; transform:translateY(-5px); box-shadow:0 10px 28px rgba(212,168,71,.25); }
    .social-btn.mail:hover::before { opacity:1; }
    .cta-wrap { margin-bottom:.5rem; }
    .cta {
      display:inline-flex; align-items:center; gap:.6rem;
      padding:.9rem 2.5rem; border-radius:3px;
      border:1px solid var(--gold-2); background:transparent;
      color:var(--gold-1);
      font-family:-apple-system, BlinkMacSystemFont, sans-serif;
      font-size:.82rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase;
      text-decoration:none; cursor:pointer;
      position:relative; overflow:hidden;
      transition:color .35s, border-color .35s, transform .25s;
      animation:ctaGlow 3s ease-in-out infinite;
    }
    .cta::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg, var(--gold-3), var(--gold-2)); opacity:0; transition:opacity .35s; }
    .cta::after {
      content:''; position:absolute; top:0; left:-80%; width:50%; height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
      transform:skewX(-20deg); transition:left .55s ease;
    }
    .cta span, .cta svg { position:relative; z-index:1; }
    .cta:hover { color:#060608; border-color:var(--gold-1); transform:translateY(-2px); }
    .cta:hover::before { opacity:1; }
    .cta:hover::after  { left:130%; }
    .cta:active { transform:scale(.98); }
    .cta svg { width:16px; height:16px; flex-shrink:0; }
    .card-footer {
      margin-top:1.8rem;
      font-family:-apple-system, BlinkMacSystemFont, sans-serif;
      font-size:.62rem; letter-spacing:.18em; text-transform:uppercase;
      color:var(--muted); opacity:.4;
    }
    @media (max-width:400px) { .card { padding:2.4rem 1.6rem 2rem; } }
  </style>
</head>

<script>
  var dust = document.getElementById("dust");
  var colors = ["rgba(212,168,71,.6)","rgba(245,230,192,.4)","rgba(154,110,30,.5)"];
  for (var i = 0; i < 22; i++) {
    var m = document.createElement("div");
    m.className = "mote";
    var s = Math.random() * 2.5 + 1;
    var c = colors[Math.floor(Math.random() * colors.length)];
    m.style.width  = s + "px";
    m.style.height = s + "px";
    m.style.left   = Math.random() * 100 + "%";
    m.style.background = c;
    m.style.boxShadow  = "0 0 " + (s * 4) + "px " + c;
    m.style.animationDuration = (Math.random() * 18 + 12) + "s";
    m.style.animationDelay    = (Math.random() * 14) + "s";
    dust.appendChild(m);
  }
</script>
